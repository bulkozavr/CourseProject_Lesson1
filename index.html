<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RushFlix</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #141414;
      color: #e5e5e5;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* ── Header ────────────────────────────────────────────────── */
    .header {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; gap: 32px;
      padding: 0 48px;
      height: 68px;
      background: linear-gradient(180deg, rgba(20,20,20,0.98) 0%, rgba(20,20,20,0) 100%);
      transition: background .3s;
    }
    .header.scrolled { background: #141414; }
    .logo {
      font-size: 28px; font-weight: 800;
      color: #0982e5;
      letter-spacing: -0.5px;
      text-transform: uppercase;
    }
    .logo span { color: #fff; }
    .nav { display: flex; gap: 20px; list-style: none; font-size: 14px; }
    .nav a {
      color: #b3b3b3; text-decoration: none; transition: color .2s;
      font-weight: 500;
    }
    .nav a:hover { color: #fff; }
    .header-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 20px;
    }
    .header-right i { font-size: 20px; cursor: pointer; }
    .bell-wrap { position: relative; display: inline-flex; }
    .bell-badge {
      position: absolute; top: -6px; right: -8px;
      min-width: 18px; height: 18px;
      padding: 0 4px;
      display: flex; align-items: center; justify-content: center;
      background: #e50914; color: #fff;
      font-size: 11px; font-weight: 700;
      border-radius: 99px;
      line-height: 1;
      pointer-events: none;
    }

    /* ── Hero ──────────────────────────────────────────────────── */
    .hero {
      position: relative;
      width: 100%; height: 100vh;
      display: flex; align-items: flex-end;
      padding: 0 48px 96px;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 140% 60% at 30% 30%, #0c2d5a 0%, transparent 70%),
        radial-gradient(ellipse 80% 50% at 70% 80%, #1a1a2e 0%, transparent 60%),
        linear-gradient(135deg, #0a0a1a 0%, #141414 50%, #0d1b2a 100%);
      z-index: -1;
    }
    .hero-bg::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 70% 20%, rgba(255,255,255,.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 50%, rgba(255,255,255,.2) 0%, transparent 100%),
        radial-gradient(2px 2px at 10% 80%, rgba(255,255,255,.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,.2) 0%, transparent 100%);
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: .6; }
      100% { opacity: 1; }
    }

    .hero-poster {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      right: 10%;
      width: 280px; height: 400px;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
      background:
        radial-gradient(circle at 30% 30%, #1e3a5f 0%, transparent 60%),
        radial-gradient(circle at 70% 80%, #2a1a3a 0%, transparent 50%),
        linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0a1628 100%);
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .hero-poster-text {
      position: relative; z-index: 1;
      line-height: 1.3;
    }
    .hero-poster-text .emoji-big { font-size: 60px; display: block; margin-bottom: 8px; }
    .hero-poster-text .year-badge {
      display: inline-block;
      background: rgba(255,255,255,.1); backdrop-filter: blur(4px);
      padding: 2px 12px; border-radius: 4px;
      font-size: 13px; color: #ccc;
    }
    .hero-poster-glow {
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(9,130,229,.15) 0%, transparent 60%);
      animation: pulseGlow 3s ease-in-out infinite alternate;
    }
    @keyframes pulseGlow {
      0%   { opacity: .5; }
      100% { opacity: 1; }
    }
    .hero-content { position: relative; z-index: 1; max-width: 640px; }
    .hero-badge {
      display: inline-block;
      background: #0982e5; color: #fff;
      padding: 4px 14px; border-radius: 4px;
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 16px;
    }
    .hero h1 {
      font-size: 60px; font-weight: 900;
      line-height: 1.05; margin-bottom: 12px;
    }
    .hero-meta {
      display: flex; align-items: center; gap: 12px;
      font-size: 15px; color: #a0a0a0; margin-bottom: 16px;
    }
    .hero-meta .match {
      color: #46d369; font-weight: 700;
    }
    .hero-meta .badge {
      border: 1px solid rgba(255,255,255,.4);
      padding: 0 6px; border-radius: 3px;
      font-size: 12px; text-transform: uppercase;
    }
    .hero p { font-size: 17px; line-height: 1.6; color: #b0b0b0; margin-bottom: 24px; max-width: 520px; }
    .hero-buttons { display: flex; gap: 12px; }
    .btn-primary, .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 28px; border-radius: 6px;
      font-size: 16px; font-weight: 700; border: none; cursor: pointer;
      transition: transform .15s, opacity .2s;
    }
    .btn-primary { background: #0982e5; color: #fff; }
    .btn-primary:hover { transform: scale(1.04); opacity: .9; }
    .btn-secondary {
      background: rgba(255,255,255,.1); color: #fff;
      backdrop-filter: blur(4px);
    }
    .btn-secondary:hover { background: rgba(255,255,255,.2); transform: scale(1.04); }

    .hero-fade {
      position: absolute; bottom: -2px; left: 0; right: 0;
      height: 160px;
      background: linear-gradient(180deg, transparent 0%, #141414 100%);
      z-index: 2;
    }

    /* ── Row Sections ──────────────────────────────────────────── */
    .browse { position: relative; z-index: 3; margin-top: -60px; padding: 0 48px 48px; }
    .row { margin-bottom: 40px; }
    .row-header {
      display: flex; align-items: baseline; gap: 10px;
      margin-bottom: 14px;
    }
    .row-header h2 {
      font-size: 22px; font-weight: 700; color: #fff;
    }
    .row-header .see-all {
      font-size: 13px; color: #a0a0a0; cursor: pointer;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .row-header .see-all:hover { color: #fff; }

    .card-row {
      display: flex; gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: none;
    }
    .card-row::-webkit-scrollbar { display: none; }

    /* ── Cards ─────────────────────────────────────────────────── */
    .card {
      flex-shrink: 0;
      width: 220px;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .25s ease, box-shadow .25s ease;
      position: relative;
    }
    .card:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 30px rgba(0,0,0,.5);
      z-index: 10;
    }
    .card-poster {
      width: 100%; aspect-ratio: 2/3;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative;
      text-align: center;
      padding: 12px;
    }
    .card-poster .poster-emoji { font-size: 36px; line-height: 1.2; }
    .card-poster .poster-title-mini {
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,.85);
      margin-top: 6px; line-height: 1.2;
      text-shadow: 0 1px 4px rgba(0,0,0,.6);
    }
    .card-top10 {
      position: absolute; bottom: 4px; left: 4px;
    }
    .card-top10 .num {
      font-size: 64px; font-weight: 900;
      color: #fff;
      line-height: .8;
      -webkit-text-stroke: 2px #333;
      text-stroke: 2px #333;
      text-shadow: -2px 0 0 #333, 0 2px 0 #333, 2px 0 0 #333, 0 -2px 0 #333;
    }
    .card-top10 .num-wrap { position: relative; }
    .card-top10 .num-wrap .poster-emoji-sm {
      position: absolute; bottom: 2px; right: -16px;
      font-size: 20px;
    }
    .card-info {
      padding: 10px 6px 8px;
      background: #1a1a1a;
    }
    .card-info .title {
      font-size: 14px; font-weight: 600; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-info .meta-line {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #888; margin-top: 4px;
    }
    .card-info .meta-line .match { color: #46d369; font-weight: 600; }
    .card-info .meta-line .year  { border: 1px solid #555; padding: 0 4px; border-radius: 2px; font-size: 11px; }

    .card-badge {
      position: absolute; top: 8px; left: 8px;
      background: #e50914; color: #fff;
      font-size: 10px; font-weight: 800;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.3px;
      z-index: 2;
      pointer-events: none;
    }

    /* ── Top 10 Special Row ────────────────────────────────────── */
    .card.top10-card { width: 300px; }
    .card.top10-card .card-poster { flex-direction: row; gap: 0; padding: 0; }
    .card.top10-card .poster-emoji { font-size: 28px; }
    .card.top10-card .card-poster .num-block {
      font-size: 100px; font-weight: 900;
      color: #0982e5;
      line-height: .8;
      min-width: 80px;
      text-align: center;
    }
    .card.top10-card .card-poster .poster-side {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex: 1; height: 100%;
      padding: 8px;
    }

    /* ── Modal ─────────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.85);
      backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #181818;
      border-radius: 12px;
      max-width: 620px; width: 100%;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.7);
      animation: modalIn .3s ease;
    }
    @keyframes modalIn {
      from { transform: scale(.92) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }
    .modal-poster {
      width: 100%; aspect-ratio: 16/9;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      font-size: 48px;
    }
    .modal-poster .modal-emoji { font-size: 64px; }
    .modal-close {
      position: absolute; top: 12px; right: 12px;
      width: 36px; height: 36px; border-radius: 50%;
      border: none; background: rgba(0,0,0,.6);
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .modal-close:hover { background: rgba(0,0,0,.9); }
    .modal-body { padding: 20px 24px 28px; }
    .modal-body h2 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
    .modal-meta {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; color: #aaa; margin-bottom: 16px;
    }
    .modal-meta .match { color: #46d369; font-weight: 700; }
    .modal-meta .badge { border: 1px solid #555; padding: 0 6px; border-radius: 3px; }
    .modal-body .desc { font-size: 15px; line-height: 1.7; color: #b0b0b0; margin-bottom: 16px; }
    .modal-body .cast { font-size: 13px; color: #777; }
    .modal-body .cast strong { color: #999; }
    .modal-buttons { display: flex; gap: 10px; margin-bottom: 20px; }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .header { padding: 0 20px; gap: 16px; }
      .nav { display: none; }
      .hero { padding: 0 20px 80px; }
      .hero h1 { font-size: 36px; }
      .hero p { font-size: 15px; }
      .hero-poster { width: 160px; height: 230px; right: 5%; }
      .hero-poster-text .emoji-big { font-size: 36px; }
      .browse { padding: 0 20px 24px; }
      .card { width: 160px; }
      .card.top10-card { width: 220px; }
      .card.top10-card .card-poster .num-block { font-size: 70px; min-width: 56px; }
      .modal { margin: 12px; }
      .row-header h2 { font-size: 18px; }
    }
    @media (max-width: 480px) {
      .hero-poster { display: none; }
      .hero h1 { font-size: 28px; }
      .card { width: 140px; }
    }
  </style>
</head>

    // ─── Build Cards ───────────────────────────────────────────
    function createCard(movie, isTop10, rank) {
      const card = document.createElement('div');
      card.className = `card${isTop10 ? ' top10-card' : ''}`;
      card.dataset.id = movie.id;

      const poster = document.createElement('div');
      poster.className = 'card-poster';
      poster.style.background = movie.gradient;

      if (isTop10) {
        const num = document.createElement('div');
        num.className = 'num-block';
        num.textContent = rank;
        poster.appendChild(num);

        const side = document.createElement('div');
        side.className = 'poster-side';
        side.innerHTML = `<span class="poster-emoji">${movie.emoji}</span>
          <span class="poster-title-mini">${movie.title}</span>`;
        poster.appendChild(side);
      } else {
        poster.innerHTML = `<span class="poster-emoji">${movie.emoji}</span>
          <span class="poster-title-mini">${movie.title}</span>`;
      }

      card.appendChild(poster);

      const info = document.createElement('div');
      info.className = 'card-info';
      info.innerHTML = `
        <div class="title">${movie.title}</div>
        <div class="meta-line">
          <span class="match">${movie.match}% Match</span>
          <span class="year">${movie.year}</span>
        </div>
      `;
      card.appendChild(info);

      // Optional badge (e.g. "NEW SEASON")
      if (movie.badge) {
        const badge = document.createElement('span');
        badge.className = 'card-badge';
        badge.textContent = movie.badge;
        poster.appendChild(badge);
      }

      card.addEventListener('click', () => openModal(movie));
      return card;
    }

    // ─── Render Rows ────────────────────────────────────────────
    const browse = document.getElementById('browse');

    ROWS.forEach(rowDef => {
      const section = document.createElement('section');
      section.className = 'row';
      section.id = `row-${rowDef.id}`;

      const header = document.createElement('div');
      header.className = 'row-header';
      header.innerHTML = `<h2>${rowDef.title}</h2><span class="see-all">See All</span>`;
      section.appendChild(header);

      const rowEl = document.createElement('div');
      rowEl.className = 'card-row';

      let movies;
      if (rowDef.id === 'top10') {
        // Top 10 gets exactly the movies flagged as top10, ordered
        movies = MOVIES.filter(m => m.top10).slice(0, 10);
        movies.forEach((m, i) => {
          rowEl.appendChild(createCard(m, true, i + 1));
        });
      } else if (rowDef.id === 'popular') {
        movies = MOVIES.filter(m => m.row === 'popular' || (!m.row && !m.top10 && !m.hero));
        movies.forEach(m => rowEl.appendChild(createCard(m, false)));
      } else {
        movies = MOVIES.filter(m => m.row === rowDef.id);
        movies.forEach(m => rowEl.appendChild(createCard(m, false)));
      }

      section.appendChild(rowEl);
      browse.appendChild(section);
    });

    // Ensure Popular row has movies (any not assigned to a specific row)
    const popularRow = document.getElementById('row-popular');
    if (popularRow) {
      const popularMovies = MOVIES.filter(m =>
        m.row === 'popular' ||
        (!m.row && !m.top10 && !m.hero)
      );
      if (popularMovies.length === 0) {
        // refill with unassigned
        const unassigned = MOVIES.filter(m => !m.row && !m.top10 && !m.hero);
        unassigned.forEach(m => {
          popularRow.querySelector('.card-row').appendChild(createCard(m, false));
        });
      }
    }

    // Move hero movie to hero
    const heroMovie = MOVIES.find(m => m.hero);
    if (heroMovie) {
      document.getElementById('heroTitle').textContent = heroMovie.title;
      document.getElementById('heroMatch').textContent = `${heroMovie.match}% Match`;
      document.getElementById('heroYear').textContent = heroMovie.year;
      document.getElementById('heroDesc').textContent = heroMovie.desc;
      document.getElementById('heroPoster').style.background = heroMovie.gradient;
      document.getElementById('heroPoster').querySelector('.emoji-big').textContent = heroMovie.emoji;
      document.getElementById('heroPoster').querySelector('.year-badge').textContent = heroMovie.year;
    }

    // ─── Modal ─────────────────────────────────────────────────
    const overlay = document.getElementById('modalOverlay');
    const closeBtn = document.getElementById('modalClose');

    function openModal(movie) {
      document.getElementById('modalTitle').textContent = movie.title;
      document.getElementById('modalMatch').textContent = `${movie.match}% Match`;
      document.getElementById('modalYear').textContent = movie.year;
      document.getElementById('modalRuntime').textContent = movie.runtime;
      document.getElementById('modalDesc').textContent = movie.desc;
      document.getElementById('modalCast').innerHTML = `<strong>Cast:</strong> ${movie.cast}`;
      const poster = document.getElementById('modalPoster');
      poster.style.background = movie.gradient;
      poster.querySelector('.modal-emoji').textContent = movie.emoji;
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }

    closeBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    // ─── Header scroll shadow ────────────────────────────────────
    window.addEventListener('scroll', () => {
      document.getElementById('header')
        .classList.toggle('scrolled', window.scrollY > 40);
    });
  </script>
